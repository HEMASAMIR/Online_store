<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>عرض الصور - اختر لكل منتج</title>
<style>
  body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; padding: 20px; }
  h1 { text-align: center; color: #e2b96f; margin-bottom: 30px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
  .card { background: #16213e; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
  .card img { width: 100%; height: 200px; object-fit: contain; background: #fff; padding: 5px; }
  .card .num { text-align: center; padding: 8px; font-size: 18px; font-weight: bold; color: #e2b96f; background: #0f3460; }
</style>
</head>
<body>
<h1>🖼️ الصور المتاحة - اختر رقم كل صورة للمنتج المقابل</h1>
<div class="grid">
</div>
<script>
  const grid = document.querySelector('.grid');
  for (let i = 1; i <= 42; i++) {
    const num = String(i).padStart(2, '0');
    grid.innerHTML += `
      <div class="card">
        <img src="/shop_images/product_img_${num}.jpg" alt="صورة ${i}" />
        <div class="num">صورة رقم ${i}</div>
      </div>`;
  }
</script>
</body>
</html>
